name: im_editorial
description: Innovation Machine — Editorial Manager
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  excel: ^4.0.6
  file_picker: ^8.1.2
  http: ^1.2.2
  shared_preferences: ^2.3.2
  share_plus: ^10.0.0
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.4
  intl: ^0.19.0
  flutter_local_notifications: ^17.2.3
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#F7941D"
  adaptive_icon_foreground: "assets/icon.png"
