workflows:
  ios-release:
    name: IM Editorial — iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.innovationmachine.imeditorial

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - innovation.machine.srl@gmail.com
        notify:
          success: true
          failure: true
