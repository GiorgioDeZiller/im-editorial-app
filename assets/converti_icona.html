<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Converti icona IM Editorial</title>
<style>body{font-family:Arial,sans-serif;padding:30px;background:#222;color:#fff;text-align:center}
canvas{border-radius:20px;box-shadow:0 0 40px rgba(247,148,29,.4)}
button{margin-top:20px;padding:14px 40px;background:#F7941D;color:#fff;border:none;
border-radius:10px;font-size:16px;font-weight:700;cursor:pointer}
button:hover{background:#D4750A}
p{color:#aaa;font-size:13px}</style>
</head>
<body>
<h2>Generazione icona IM Editorial 1024×1024</h2>
<canvas id="c" width="1024" height="1024"></canvas>
<br>
<button onclick="scarica()">⬇ Scarica icon.png (1024×1024)</button>
<p>Salva il file come <code>assets/icon.png</code> nella cartella del progetto Flutter</p>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function draw(){
  // Sfondo arancione
  ctx.save();
  roundRect(0,0,1024,1024,180);
  ctx.fillStyle='#F7941D';
  ctx.fill();
  ctx.restore();

  // Gruppo logo centrato
  ctx.save();
  ctx.translate(512, 440);
  const sc = 2.15;
  ctx.scale(sc, sc);

  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Staffa sinistra esterna
  ctx.beginPath();
  ctx.moveTo(-48,-68);
  ctx.bezierCurveTo(-58,-68,-62,-60,-62,-49);
  ctx.lineTo(-62,44);
  ctx.bezierCurveTo(-62,55,-58,63,-48,63);
  ctx.strokeStyle='white';
  ctx.lineWidth=7;
  ctx.stroke();

  // Staffa sinistra interna
  ctx.beginPath();
  ctx.moveTo(-38,-59);
  ctx.bezierCurveTo(-47,-59,-50,-53,-50,-44);
  ctx.lineTo(-50,37);
  ctx.bezierCurveTo(-50,46,-47,52,-38,52);
  ctx.strokeStyle='white';
  ctx.lineWidth=5.5;
  ctx.stroke();

  // Profilo testa
  ctx.beginPath();
  ctx.moveTo(-38,-68);
  ctx.lineTo(19,-68);
  ctx.bezierCurveTo(35,-67,51,-58,60,-45);
  ctx.bezierCurveTo(69,-32,69,-15,63,-2);
  ctx.bezierCurveTo(59,7,56,13,58,18);
  ctx.bezierCurveTo(61,24,62,27,59,31);
  ctx.bezierCurveTo(56,36,51,37,48,34);
  ctx.bezierCurveTo(44,31,42,34,40,38);
  ctx.bezierCurveTo(36,44,34,49,29,51);
  ctx.bezierCurveTo(23,54,15,55,7,55);
  ctx.lineTo(7,64);
  ctx.bezierCurveTo(7,67,4,69,1,69);
  ctx.lineTo(-38,69);
  ctx.closePath();
  ctx.strokeStyle='white';
  ctx.lineWidth=3.2;
  ctx.stroke();

  // Spirale grigio-marrone
  ctx.beginPath();
  ctx.moveTo(15,-39);
  ctx.bezierCurveTo(28,-38,38,-28,38,-15);
  ctx.bezierCurveTo(38,-1,28,9,15,12);
  ctx.bezierCurveTo(1,15,-13,6,-18,-7);
  ctx.bezierCurveTo(-23,-21,-16,-36,-2,-40);
  ctx.bezierCurveTo(11,-44,26,-36,29,-22);
  ctx.bezierCurveTo(32,-8,23,3,11,6);
  ctx.bezierCurveTo(-1,9,-11,2,-14,-8);
  ctx.bezierCurveTo(-17,-17,-11,-28,-1,-31);
  ctx.bezierCurveTo(9,-34,19,-27,21,-17);
  ctx.bezierCurveTo(23,-7,17,1,10,3);
  ctx.strokeStyle='#7A6248';
  ctx.lineWidth=1.5;
  ctx.stroke();

  // Stella
  ctx.save();
  ctx.translate(23,-75);
  ctx.strokeStyle='white';
  ctx.lineCap='round';
  ctx.lineWidth=1.5;
  [[0,-5,0,5],[- 5,0,5,0]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  });
  ctx.lineWidth=1.2;
  [[-3,-3,3,3],[3,-3,-3,3]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  });
  ctx.beginPath();ctx.arc(0,0,1.2,0,Math.PI*2);
  ctx.fillStyle='white';ctx.fill();
  ctx.restore();

  ctx.restore();

  // Testo EDITORIAL
  ctx.save();
  ctx.font = "900 96px 'Arial Black', Arial, sans-serif";
  ctx.fillStyle = 'white';
  ctx.textAlign = 'center';
  ctx.letterSpacing = '10px';
  ctx.fillText('EDITORIAL', 512, 890);
  ctx.restore();

  // Linea bianca decorativa
  ctx.beginPath();
  ctx.moveTo(160,915);ctx.lineTo(864,915);
  ctx.strokeStyle='rgba(255,255,255,0.55)';
  ctx.lineWidth=5;
  ctx.lineJoin='round';
  ctx.stroke();
}

draw();

function scarica(){
  const a=document.createElement('a');
  a.download='icon.png';
  a.href=c.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
